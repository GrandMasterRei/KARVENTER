services:
  karventer-api:
    build:
      context: ./backend
    container_name: karventer-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@karventer-db:5432/karventer
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
      OLLAMA_MODEL: qwen3:8b
      LLM_GATEWAY_URL: http://karventer-llm-gateway:8010
      LLM_GATEWAY_KEY: karventer-local-llm-key
      LLM_TIMEOUT_SECONDS: "70"
      LLM_HEALTH_TIMEOUT_SECONDS: "12"
      LLM_WARMUP_TIMEOUT_SECONDS: "45"
      SECRET_KEY: karventer-gizli-anahtar-2026
    depends_on:
      karventer-db:
        condition: service_healthy
      karventer-cache:
        condition: service_started
      karventer-llm-gateway:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app/ml_models:/app/app/ml_models
    restart: unless-stopped

  karventer-llm-gateway:
    build:
      context: ./llm_gateway
    container_name: karventer-llm-gateway
    ports:
      - "8010:8010"
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:8b
      KARVENTER_GATEWAY_KEY: karventer-local-llm-key
      OLLAMA_TIMEOUT_SECONDS: "90"
      OLLAMA_KEEP_ALIVE: "4h"
      OLLAMA_NUM_PREDICT: "220"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  karventer-db:
    image: postgres:15-alpine
    container_name: karventer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: karventer
    ports:
      - "5432:5432"
    volumes:
      - karventer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d karventer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  karventer-adminer:
    image: adminer:4
    container_name: karventer-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: karventer-db
    depends_on:
      karventer-db:
        condition: service_healthy
    restart: unless-stopped

  karventer-cache:
    image: redis:7-alpine
    container_name: karventer-cache
    restart: unless-stopped

  karventer-frontend:
    build:
      context: ./frontend
    container_name: karventer-frontend
    ports:
      - "5173:5173"
    depends_on:
      - karventer-api
    restart: unless-stopped

volumes:
  karventer_postgres_data:
