version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: karventer-db
    environment:
      POSTGRES_USER: karventer_user
      POSTGRES_PASSWORD: karventer_password
      POSTGRES_DB: karventer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: