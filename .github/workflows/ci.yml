name: KARVENTER CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: karventer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Kodu Depodan Çek
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov httpx

    - name: Veritabanını Bekle
      run: sleep 10

    - name: Testleri Çalıştır
      env:
        DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5432/karventer
        PYTHONPATH: ./backend
      run: |
        python -m pytest --cov=app backend/tests/test_main.py