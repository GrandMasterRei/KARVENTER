name: KARVENTER CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # GitHub sunucusunda geçici bir Postgres veritabanı ayağa kaldırır
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: karventer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Postgres v3 driver ve test kütüphanelerini kuruyoruz
        pip install pytest httpx fastapi sqlalchemy "psycopg[binary]" pydantic-settings

    - name: Run Pytest
      env:
        # Kodun içindeki database.py'ye 'localhost' üzerinden bağlan diyoruz
        DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5432/karventer
        PYTHONPATH: ./backend
      run: |
        python -m pytest backend/tests/test_main.py