name: KARVENTER CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # BURASI ÖNEMLİ: GitHub senin için gerçek bir veritabanı açıyor
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: karventer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Gerekli tüm kütüphaneleri yüklüyoruz
        pip install pytest httpx fastapi sqlalchemy psycopg-binary pydantic-settings

    - name: Run Pytest
      env:
        # Kodun içindeki bağlantı adresini GitHub ortamına uyduruyoruz
        DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5432/karventer
      run: |
        # Backend klasöründen testi çalıştır
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        python -m pytest backend/tests/test_main.py